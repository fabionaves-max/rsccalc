{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0">Acesso ao Sistema</h4>
                <small>Reconhecimento de Saberes e Competências</small>
            </div>
            <div class="card-body p-4">

                {% if form.errors %}
                    <div class="alert alert-danger">
                        Usuário ou senha incorretos. Por favor, tente novamente.
                    </div>
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-bold">Usuário (SIAPE)</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Senha</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-lg">Entrar</button>

                    <input type="hidden" name="next" value="{{ next }}" />
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
